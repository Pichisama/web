<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>PichonSnake</title>
    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        canvas {
            background: #222;
            border: 2px solid #555;
            margin-top: 10px;
        }

        #score,
        #highscore {
            margin-top: 8px;
            font-size: 18px;
        }

        button {
            margin-top: 10px;
            padding: 8px 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🐍 Snake</h1>
    <div id="score">Puntos: 0</div>
    <div id="highscore">Récord: 0</div>
    <button onclick="startGame()">Empezar</button>
    <br>
    <canvas id="game" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        let snake, direction, food, score, gameLoop;

        // cargar récord
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        document.getElementById("highscore").textContent = "Récord: " + highScore;

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            score = 0;

            document.getElementById("score").textContent = "Puntos: 0";

            placeFood();

            clearInterval(gameLoop);
            gameLoop = setInterval(update, 120);
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize))
            };
        }

        function update() {
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (
                head.x < 0 || head.y < 0 ||
                head.x >= canvas.width / gridSize ||
                head.y >= canvas.height / gridSize ||
                snake.some(s => s.x === head.x && s.y === head.y)
            ) {
                clearInterval(gameLoop);

                // guardar récord
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                }

                document.getElementById("highscore").textContent = "Récord: " + highScore;

                alert("Game Over! Puntaje: " + score);
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById("score").textContent = "Puntos: " + score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "lime";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            ctx.fillStyle = "red";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        document.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && direction.y === 0) direction = { x: 0, y: -1 };
            else if (e.key === "ArrowDown" && direction.y === 0) direction = { x: 0, y: 1 };
            else if (e.key === "ArrowLeft" && direction.x === 0) direction = { x: -1, y: 0 };
            else if (e.key === "ArrowRight" && direction.x === 0) direction = { x: 1, y: 0 };
        });
    </script>

</body>

</html>
