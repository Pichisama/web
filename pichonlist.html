<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PichonList</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #17171d;
    --surface2: #1f1f28;
    --surface3: #2a2a36;
    --border: #2e2e3e;
    --accent: #7c6ff7;
    --accent-dim: #3d3872;
    --text: #e8e8f0;
    --text-muted: #7a7a99;
    --red: #e84040;
    --red-dim: #5c1a1a;
    --blue: #3a8fe8;
    --blue-dim: #1a3a5c;
    --green: #3ae88a;
    --check-border: #4a4a66;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,17,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 1.5rem;
    letter-spacing: -1px;
    color: #ffffff;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #9488ff; }

  .btn-secondary {
    background: var(--surface3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--surface2); border-color: var(--accent); }

  .btn-red {
    background: var(--red);
    color: #fff;
  }
  .btn-red:hover { background: #ff5555; }

  .btn-blue {
    background: var(--blue);
    color: #fff;
  }
  .btn-blue:hover { background: #5aadff; }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    padding: 6px 10px;
    font-size: 0.78rem;
  }
  .btn-ghost:hover { color: var(--text); background: var(--surface3); }

  .btn-sm {
    padding: 5px 11px;
    font-size: 0.75rem;
  }

  .btn-icon {
    padding: 6px 8px;
    font-size: 0.9rem;
    line-height: 1;
  }

  /* ── MAIN CONTENT ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 400px;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal h2 {
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal input, .modal textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .modal input:focus, .modal textarea:focus {
    border-color: var(--accent);
  }

  .modal label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-field { margin-bottom: 16px; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-confirm-msg {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .modal-confirm-msg strong { color: var(--text); }

  /* ── SECTIONS: FREE LISTS + TOPICS ── */
  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section { margin-bottom: 40px; }

  /* ── TOPIC ── */
  .topic {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .topic-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .topic-header:hover { background: var(--surface3); }

  .topic-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .topic-chevron {
    font-size: 0.75rem;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .topic.collapsed .topic-chevron { transform: rotate(-90deg); }

  .topic-name {
    font-weight: 800;
    font-size: 1rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topic-count {
    font-size: 0.72rem;
    background: var(--accent-dim);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    white-space: nowrap;
  }

  .topic-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .topic-body {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .topic.collapsed .topic-body { display: none; }

  .topic-add-list {
    display: flex;
    justify-content: flex-start;
    padding: 0 16px 16px;
  }

  .topic.collapsed .topic-add-list { display: none; }

  /* ── LIST CARD ── */
  .list-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    animation: fadeIn 0.2s ease;
    display: flex;
    flex-direction: column;
  }

  .list-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    background: var(--surface3);
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .list-card-title {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .list-card-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .list-items {
    padding: 8px 12px;
    flex: 1;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: fadeIn 0.15s ease;
  }

  .list-item:last-child { border-bottom: none; }

  /* Custom checkbox */
  .item-check {
    width: 18px;
    height: 18px;
    border: 2px solid var(--check-border);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }

  .item-check:hover { border-color: var(--accent); }

  .item-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .item-check.checked::after {
    content: '✓';
    font-size: 11px;
    color: #fff;
    font-weight: 700;
  }

  .item-text {
    flex: 1;
    font-size: 0.85rem;
    color: var(--text);
    transition: all 0.15s;
    word-break: break-word;
  }

  .item-text.done {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .item-actions {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .list-item:hover .item-actions { opacity: 1; }

  .list-add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: transparent;
    border: none;
    border-top: 1px dashed var(--border);
    color: var(--accent);
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.15s;
    letter-spacing: 0.3px;
  }

  .list-add-btn:hover { background: var(--surface3); }

  /* ── FREE LISTS (sin tema) ── */
  .free-lists-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── SELECT (topic chooser) ── */
  .modal select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .modal select:focus { border-color: var(--accent); }
  .modal select option { background: var(--surface2); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">PichonList</div>
  <div class="header-actions">
    <button class="btn btn-secondary" onclick="openNewListModal()">＋ Añadir lista</button>
    <button class="btn btn-primary" onclick="openNewTopicModal()">＋ Añadir tema</button>
  </div>
</header>

<!-- MAIN -->
<main id="app">
  <!-- rendered by JS -->
</main>

<!-- ══════════ MODALS ══════════ -->

<!-- New Topic -->
<div class="modal-overlay" id="modal-new-topic">
  <div class="modal">
    <h2>Nuevo tema</h2>
    <div class="modal-field">
      <label>Nombre del tema</label>
      <input type="text" id="input-topic-name" placeholder="Ej: Compras, Trabajo..." maxlength="60"
             onkeydown="if(event.key==='Enter') confirmNewTopic()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-topic')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmNewTopic()">Crear tema</button>
    </div>
  </div>
</div>

<!-- New List -->
<div class="modal-overlay" id="modal-new-list">
  <div class="modal">
    <h2>Nueva lista</h2>
    <div class="modal-field">
      <label>Nombre de la lista</label>
      <input type="text" id="input-list-name" placeholder="Ej: Lunes, Semana 1..." maxlength="60"
             onkeydown="if(event.key==='Enter') confirmNewList()">
    </div>
    <div class="modal-field">
      <label>Tema (opcional)</label>
      <select id="select-list-topic">
        <option value="">— Sin tema —</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-list')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmNewList()">Crear lista</button>
    </div>
  </div>
</div>

<!-- New Item -->
<div class="modal-overlay" id="modal-new-item">
  <div class="modal">
    <h2>Añadir elemento</h2>
    <div class="modal-field">
      <label>Elemento</label>
      <input type="text" id="input-item-name" placeholder="Ej: Huevos, 3 litros de leche..." maxlength="120"
             onkeydown="if(event.key==='Enter') confirmNewItem()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-item')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmNewItem()">Añadir</button>
    </div>
  </div>
</div>

<!-- Edit Item -->
<div class="modal-overlay" id="modal-edit-item">
  <div class="modal">
    <h2>Editar elemento</h2>
    <div class="modal-field">
      <label>Texto</label>
      <input type="text" id="input-edit-item-name" maxlength="120"
             onkeydown="if(event.key==='Enter') confirmEditItem()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-item')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmEditItem()">Guardar</button>
    </div>
  </div>
</div>

<!-- Edit List -->
<div class="modal-overlay" id="modal-edit-list">
  <div class="modal">
    <h2>Editar lista</h2>
    <div class="modal-field">
      <label>Nombre</label>
      <input type="text" id="input-edit-list-name" maxlength="60"
             onkeydown="if(event.key==='Enter') confirmEditList()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-list')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmEditList()">Guardar</button>
    </div>
  </div>
</div>

<!-- Edit Topic -->
<div class="modal-overlay" id="modal-edit-topic">
  <div class="modal">
    <h2>Editar tema</h2>
    <div class="modal-field">
      <label>Nombre</label>
      <input type="text" id="input-edit-topic-name" maxlength="60"
             onkeydown="if(event.key==='Enter') confirmEditTopic()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-topic')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmEditTopic()">Guardar</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="modal-overlay" id="modal-confirm-delete">
  <div class="modal">
    <h2>Confirmar eliminación</h2>
    <p class="modal-confirm-msg" id="confirm-delete-msg"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm-delete')">Cancelar</button>
      <button class="btn btn-red" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
// ══════════ DATA ══════════
let data = {
  topics: [],   // { id, name, collapsed }
  lists: [],    // { id, name, topicId|null }
  items: []     // { id, listId, text, done }
};

function load() {
  const saved = localStorage.getItem('pichonlist-v1');
  if (saved) {
    try { data = JSON.parse(saved); } catch(e) {}
  }
}

function save() {
  localStorage.setItem('pichonlist-v1', JSON.stringify(data));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ══════════ RENDER ══════════
function render() {
  const app = document.getElementById('app');
  let html = '';

  // — TOPICS —
  const topics = data.topics;
  html += `<div class="section">`;
  html += `<div class="section-label">Temas</div>`;

  if (topics.length === 0) {
    html += `<div class="empty-state"><div class="icon">🗂️</div><p>No hay temas todavía.<br>Creá uno con el botón de arriba.</p></div>`;
  } else {
    for (const topic of topics) {
      const topicLists = data.lists.filter(l => l.topicId === topic.id);
      const collapsed = topic.collapsed ? 'collapsed' : '';
      html += `<div class="topic ${collapsed}" id="topic-${topic.id}">`;
      html += `<div class="topic-header" onclick="toggleTopic('${topic.id}')">`;
      html += `<div class="topic-title-row">`;
      html += `<span class="topic-chevron">▼</span>`;
      html += `<span class="topic-name">${esc(topic.name)}</span>`;
      html += `<span class="topic-count">${topicLists.length} lista${topicLists.length !== 1 ? 's' : ''}</span>`;
      html += `</div>`;
      html += `<div class="topic-actions" onclick="event.stopPropagation()">`;
      html += `<button class="btn btn-blue btn-sm btn-icon" title="Editar tema" onclick="openEditTopicModal('${topic.id}')">✏️</button>`;
      html += `<button class="btn btn-red btn-sm btn-icon" title="Eliminar tema" onclick="openDeleteTopic('${topic.id}')">🗑️</button>`;
      html += `</div>`;
      html += `</div>`;

      // Lists inside topic
      if (topicLists.length === 0) {
        html += `<div class="topic-body"><div style="color:var(--text-muted);font-size:0.82rem;padding:4px 0;grid-column:1/-1;">No hay listas en este tema.</div></div>`;
      } else {
        html += `<div class="topic-body">`;
        for (const list of topicLists) {
          html += renderListCard(list);
        }
        html += `</div>`;
      }

      html += `<div class="topic-add-list">`;
      html += `<button class="btn btn-secondary btn-sm" onclick="openNewListModalForTopic('${topic.id}')">＋ Añadir lista</button>`;
      html += `</div>`;
      html += `</div>`;
    }
  }
  html += `</div>`;

  // — FREE LISTS —
  const freeLists = data.lists.filter(l => !l.topicId);
  html += `<div class="section">`;
  html += `<div class="section-label">Listas sin tema</div>`;

  if (freeLists.length === 0) {
    html += `<div class="empty-state"><div class="icon">📋</div><p>No hay listas sueltas todavía.<br>Creá una con el botón "Añadir lista".</p></div>`;
  } else {
    html += `<div class="free-lists-grid">`;
    for (const list of freeLists) {
      html += renderListCard(list);
    }
    html += `</div>`;
  }
  html += `</div>`;

  app.innerHTML = html;
}

function renderListCard(list) {
  const items = data.items.filter(i => i.listId === list.id);
  let html = `<div class="list-card" id="list-${list.id}">`;
  html += `<div class="list-card-header">`;
  html += `<span class="list-card-title">${esc(list.name)}</span>`;
  html += `<div class="list-card-actions">`;
  html += `<button class="btn btn-blue btn-sm btn-icon" title="Editar lista" onclick="openEditListModal('${list.id}')">✏️</button>`;
  html += `<button class="btn btn-red btn-sm btn-icon" title="Eliminar lista" onclick="openDeleteList('${list.id}')">🗑️</button>`;
  html += `</div>`;
  html += `</div>`;

  html += `<div class="list-items">`;
  if (items.length === 0) {
    html += `<div style="color:var(--text-muted);font-size:0.8rem;padding:10px 0;text-align:center;">Lista vacía</div>`;
  } else {
    for (const item of items) {
      const doneClass = item.done ? 'checked' : '';
      const textClass = item.done ? 'done' : '';
      html += `<div class="list-item" id="item-${item.id}">`;
      html += `<div class="item-check ${doneClass}" onclick="toggleItem('${item.id}')"></div>`;
      html += `<span class="item-text ${textClass}">${esc(item.text)}</span>`;
      html += `<div class="item-actions">`;
      html += `<button class="btn btn-blue btn-sm btn-icon" title="Editar elemento" onclick="openEditItemModal('${item.id}')">✏️</button>`;
      html += `<button class="btn btn-red btn-sm btn-icon" title="Eliminar elemento" onclick="openDeleteItem('${item.id}')">🗑️</button>`;
      html += `</div>`;
      html += `</div>`;
    }
  }
  html += `</div>`;

  html += `<button class="list-add-btn" onclick="openNewItemModal('${list.id}')">＋ Añadir elemento</button>`;
  html += `</div>`;
  return html;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ══════════ TOPIC COLLAPSE ══════════
function toggleTopic(id) {
  const t = data.topics.find(t => t.id === id);
  if (t) { t.collapsed = !t.collapsed; save(); render(); }
}

// ══════════ MODALS ══════════
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

// ── NEW TOPIC ──
function openNewTopicModal() {
  document.getElementById('input-topic-name').value = '';
  openModal('modal-new-topic');
  setTimeout(() => document.getElementById('input-topic-name').focus(), 80);
}

function confirmNewTopic() {
  const name = document.getElementById('input-topic-name').value.trim();
  if (!name) return;
  data.topics.push({ id: uid(), name, collapsed: false });
  save(); render();
  closeModal('modal-new-topic');
}

// ── NEW LIST ──
let _newListTopicId = null;

function openNewListModal() {
  _newListTopicId = null;
  document.getElementById('input-list-name').value = '';
  // populate topic select
  const sel = document.getElementById('select-list-topic');
  sel.innerHTML = '<option value="">— Sin tema —</option>';
  data.topics.forEach(t => {
    sel.innerHTML += `<option value="${t.id}">${esc(t.name)}</option>`;
  });
  sel.value = '';
  sel.disabled = false;
  openModal('modal-new-list');
  setTimeout(() => document.getElementById('input-list-name').focus(), 80);
}

function openNewListModalForTopic(topicId) {
  _newListTopicId = topicId;
  document.getElementById('input-list-name').value = '';
  const topic = data.topics.find(t => t.id === topicId);
  const sel = document.getElementById('select-list-topic');
  sel.innerHTML = `<option value="${topicId}">${esc(topic.name)}</option>`;
  sel.value = topicId;
  sel.disabled = true;
  openModal('modal-new-list');
  setTimeout(() => document.getElementById('input-list-name').focus(), 80);
}

function confirmNewList() {
  const name = document.getElementById('input-list-name').value.trim();
  if (!name) return;
  const sel = document.getElementById('select-list-topic');
  const topicId = sel.value || null;
  data.lists.push({ id: uid(), name, topicId });
  save(); render();
  closeModal('modal-new-list');
}

// ── NEW ITEM ──
let _newItemListId = null;

function openNewItemModal(listId) {
  _newItemListId = listId;
  document.getElementById('input-item-name').value = '';
  openModal('modal-new-item');
  setTimeout(() => document.getElementById('input-item-name').focus(), 80);
}

function confirmNewItem() {
  const text = document.getElementById('input-item-name').value.trim();
  if (!text) return;
  data.items.push({ id: uid(), listId: _newItemListId, text, done: false });
  save(); render();
  closeModal('modal-new-item');
}

// ── TOGGLE ITEM ──
function toggleItem(id) {
  const item = data.items.find(i => i.id === id);
  if (item) { item.done = !item.done; save(); render(); }
}

// ── EDIT ITEM ──
let _editItemId = null;

function openEditItemModal(id) {
  _editItemId = id;
  const item = data.items.find(i => i.id === id);
  document.getElementById('input-edit-item-name').value = item.text;
  openModal('modal-edit-item');
  setTimeout(() => document.getElementById('input-edit-item-name').focus(), 80);
}

function confirmEditItem() {
  const text = document.getElementById('input-edit-item-name').value.trim();
  if (!text) return;
  const item = data.items.find(i => i.id === _editItemId);
  if (item) { item.text = text; save(); render(); }
  closeModal('modal-edit-item');
}

// ── EDIT LIST ──
let _editListId = null;

function openEditListModal(id) {
  _editListId = id;
  const list = data.lists.find(l => l.id === id);
  document.getElementById('input-edit-list-name').value = list.name;
  openModal('modal-edit-list');
  setTimeout(() => document.getElementById('input-edit-list-name').focus(), 80);
}

function confirmEditList() {
  const name = document.getElementById('input-edit-list-name').value.trim();
  if (!name) return;
  const list = data.lists.find(l => l.id === _editListId);
  if (list) { list.name = name; save(); render(); }
  closeModal('modal-edit-list');
}

// ── EDIT TOPIC ──
let _editTopicId = null;

function openEditTopicModal(id) {
  _editTopicId = id;
  const topic = data.topics.find(t => t.id === id);
  document.getElementById('input-edit-topic-name').value = topic.name;
  openModal('modal-edit-topic');
  setTimeout(() => document.getElementById('input-edit-topic-name').focus(), 80);
}

function confirmEditTopic() {
  const name = document.getElementById('input-edit-topic-name').value.trim();
  if (!name) return;
  const topic = data.topics.find(t => t.id === _editTopicId);
  if (topic) { topic.name = name; save(); render(); }
  closeModal('modal-edit-topic');
}

// ── DELETE CONFIRM ──
let _deleteCallback = null;

function openConfirmDelete(msg, cb) {
  document.getElementById('confirm-delete-msg').innerHTML = msg;
  _deleteCallback = cb;
  openModal('modal-confirm-delete');
}

function confirmDelete() {
  if (_deleteCallback) _deleteCallback();
  _deleteCallback = null;
  closeModal('modal-confirm-delete');
}

function openDeleteTopic(id) {
  const topic = data.topics.find(t => t.id === id);
  const listCount = data.lists.filter(l => l.topicId === id).length;
  openConfirmDelete(
    `¿Eliminar el tema <strong>"${esc(topic.name)}"</strong>?<br>
    Se eliminarán también sus <strong>${listCount} lista${listCount !== 1 ? 's' : ''}</strong> y todos sus elementos.`,
    () => {
      const listIds = data.lists.filter(l => l.topicId === id).map(l => l.id);
      data.items = data.items.filter(i => !listIds.includes(i.listId));
      data.lists = data.lists.filter(l => l.topicId !== id);
      data.topics = data.topics.filter(t => t.id !== id);
      save(); render();
    }
  );
}

function openDeleteList(id) {
  const list = data.lists.find(l => l.id === id);
  const itemCount = data.items.filter(i => i.listId === id).length;
  openConfirmDelete(
    `¿Eliminar la lista <strong>"${esc(list.name)}"</strong>?<br>
    Se eliminarán sus <strong>${itemCount} elemento${itemCount !== 1 ? 's' : ''}</strong>.`,
    () => {
      data.items = data.items.filter(i => i.listId !== id);
      data.lists = data.lists.filter(l => l.id !== id);
      save(); render();
    }
  );
}

function openDeleteItem(id) {
  const item = data.items.find(i => i.id === id);
  openConfirmDelete(
    `¿Eliminar el elemento <strong>"${esc(item.text)}"</strong>?`,
    () => {
      data.items = data.items.filter(i => i.id !== id);
      save(); render();
    }
  );
}

// ══════════ INIT ══════════
load();
render();
</script>
</body>
